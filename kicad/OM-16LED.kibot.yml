kibot:
  version: 1

global:
  out_dir: ./Release
  filters: 
    - number: 142
    - number: 145

import:
- file: JLCPCB_stencil_with_THT
  definitions:
    _KIBOT_MANF_DIR: Manufacturers/JLCPCB
    _KIBOT_POS_PRE_TRANSFORM: '[''_kicost_rename'', ''_rot_footprint'']'
- file: PCBWay_stencil
  definitions:
    _KIBOT_MANF_DIR: Manufacturers/PCBWay
- file: ExportProject
  definitions:
    _KIBOT_DIR_COMP: Project

preflight:
  drc:
    format: CSV
  erc:
    format: CSV
  check_zone_fills: true
  # update_xml: true

outputs:
- name: generic_bom_csv
  comment: Generic Bill of Materials in CSV format
  type: bom
  dir: BoM/Generic
  options:
    format: CSV
    count_smd_tht: true
- name: generic_bom_xml
  comment: Generic Bill of Materials in XML format
  type: bom
  dir: BoM/Generic
  options:
    format: XML
    count_smd_tht: true
- name: generic_bom_xlsx
  comment: Generic Bill of Materials in XLSX format
  type: bom
  dir: BoM/Generic
  options:
    format: XLSX
    count_smd_tht: true
- name: kicad_internal_bom
  type: bom
  dir: BoM/KiCad
  comment: BoM using KiCad settings
  options:
    format: KICAD
    ignore_dnf: false
    group_not_fitted: true
    group_fields: []
    sort_style: kicad_bom
    columns:
    - _kicad_bom_fields
# - name: kicost
#   type: kicost
#   dir: BoM
#   comment: Generate components costs spreadsheet
- name: download_datasheets
  comment: Download the datasheets
  type: download_datasheets
  dir: Datasheets
- name: dxf
  comment: Individual layers in DXF format
  type: dxf
  dir: Individual_Layers/DXF
  layers:
  - layer: F.Cu
    suffix: F_Cu
    description: Front copper
  - layer: F.Mask
    suffix: F_Mask
    description: Front soldermask (negative)
  - layer: B.Cu
    suffix: B_Cu
    description: Bottom copper
  - layer: B.Mask
    suffix: B_Mask
    description: Bottom soldermask (negative)
  - layer: F.Silkscreen
    suffix: F_Silkscreen
    description: Front silkscreen (artwork)
  - layer: B.Silkscreen
    suffix: B_Silkscreen
    description: Bottom silkscreen (artwork)
  - layer: F.Paste
    suffix: F_Paste
    description: Front solder paste
  - layer: B.Paste
    suffix: B_Paste
    description: Bottom solder paste
  - layer: Edge.Cuts
    suffix: Edge_Cuts
    description: Board shape
  - layer: B.Courtyard
    suffix: B_Courtyard
    description: Bottom courtyard area
  - layer: F.Courtyard
    suffix: F_Courtyard
    description: Front courtyard area
  - layer: B.Fab
    suffix: B_Fab
    description: Bottom documentation
  - layer: F.Fab
    suffix: F_Fab
    description: Front documentation
- name: dxf_sch_print
  comment: Schematic in DXF format
  type: dxf_sch_print
  dir: Schematic
