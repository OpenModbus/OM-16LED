- name: info
  comment: Information about the run
  type: info
  dir: .
- name: pcb_print_svg
  comment: PCB
  type: pcb_print
  dir: PCB/SVG
  options:
    format: SVG
    pages:
    - layers:
      - layer: F.Cu
      - layer: F.Mask
        color: '#14332440'
      - layer: F.Paste
      - layer: F.Silkscreen
      - layer: Edge.Cuts
      sheet: Front copper
    - layers:
      - layer: F.Mask
        color: '#14332440'
      - layer: Edge.Cuts
      sheet: Front soldermask (negative)
    - layers:
      - layer: B.Cu
      - layer: B.Mask
        color: '#14332440'
      - layer: B.Paste
      - layer: B.Silkscreen
      - layer: Edge.Cuts
      mirror: true
      sheet: Bottom copper
    - layers:
      - layer: B.Courtyard
      - layer: Edge.Cuts
      mirror: true
      sheet: Bottom courtyard area
    - layers:
      - layer: F.Courtyard
      - layer: Edge.Cuts
      sheet: Front courtyard area
    - layers:
      - layer: B.Fab
      - layer: Edge.Cuts
      mirror: true
      sheet: Bottom documentation
    - layers:
      - layer: F.Fab
      - layer: Edge.Cuts
      sheet: Front documentation
    - repeat_for_layer: User.Drawings
      repeat_layers: drill_pairs
      layers:
      - layer: User.Drawings
        color: '#000000'
      - layer: Edge.Cuts
        color: '#000000'
    keep_temporal_files: true
    add_background: true
- name: pcbdraw_svg_set-black-enig_top
  comment: PCB 2D render in SVG format, using set-black-enig style
  type: pcbdraw
  dir: PCB/2D
  options:
    style: set-black-enig
    format: svg
- name: pcbdraw_png_set-black-enig_top
  comment: PCB 2D render in PNG format, using set-black-enig style
  type: pcbdraw
  dir: PCB/2D
  options:
    style: set-black-enig
    format: png
- name: pcbdraw_svg_set-black-enig_bottom
  comment: PCB 2D render in SVG format, using set-black-enig style
  type: pcbdraw
  dir: PCB/2D
  options:
    style: set-black-enig
    format: svg
    bottom: true
- name: pcbdraw_png_set-black-enig_bottom
  comment: PCB 2D render in PNG format, using set-black-enig style
  type: pcbdraw
  dir: PCB/2D
  options:
    style: set-black-enig
    format: png
    bottom: true
- name: pdf
  comment: Individual layers in PDF format
  type: pdf
  dir: Individual_Layers/PDF
  layers:
  - layer: F.Cu
    suffix: F_Cu
    description: Front copper
  - layer: F.Mask
    suffix: F_Mask
    description: Front soldermask (negative)
  - layer: B.Cu
    suffix: B_Cu
    description: Bottom copper
  - layer: B.Mask
    suffix: B_Mask
    description: Bottom soldermask (negative)
  - layer: F.Silkscreen
    suffix: F_Silkscreen
    description: Front silkscreen (artwork)
  - layer: B.Silkscreen
    suffix: B_Silkscreen
    description: Bottom silkscreen (artwork)
  - layer: F.Paste
    suffix: F_Paste
    description: Front solder paste
  - layer: B.Paste
    suffix: B_Paste
    description: Bottom solder paste
  - layer: Edge.Cuts
    suffix: Edge_Cuts
    description: Board shape
  - layer: B.Courtyard
    suffix: B_Courtyard
    description: Bottom courtyard area
  - layer: F.Courtyard
    suffix: F_Courtyard
    description: Front courtyard area
  - layer: B.Fab
    suffix: B_Fab
    description: Bottom documentation
  - layer: F.Fab
    suffix: F_Fab
    description: Front documentation
- name: pdf_sch_print
  comment: Schematic in PDF format
  type: pdf_sch_print
  dir: Schematic
  options:
    monochrome: true
