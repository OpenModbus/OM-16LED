- name: report_full
  comment: Full design report
  type: report
  options:
    template: full_SVG
- name: svg
  comment: Individual layers in SVG format
  type: svg
  dir: Individual_Layers/SVG
  layers:
  - layer: F.Cu
    suffix: F_Cu
    description: Front copperzip
  - layer: F.Mask
    suffix: F_Mask
    description: Front soldermask (negative)
  - layer: B.Cu
    suffix: B_Cu
    description: Bottom copper
